<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listings Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a38;
    --text: #f5f5f5;
    --text-muted: #888;
    --radius: 14px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --ig1: #f58529;
    --ig2: #dd2a7b;
    --ig3: #8134af;
    --ig4: #515bd4;
    --ig-grad: linear-gradient(45deg, #f58529, #feda77, #dd2a7b, #8134af, #515bd4);
    --ig-grad-btn: linear-gradient(135deg, #f58529 0%, #dd2a7b 50%, #515bd4 100%);
  }

  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }
  body::before {
    content: '';
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(221,42,123,0.12) 0%, rgba(81,91,212,0.08) 50%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

.topbar {
  display: flex;
  align-items: center;
  justify-content: center; /* center everything */
  padding: 18px 32px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(16px);
  position: sticky;
  top: 0;
  z-index: 100;
  position: relative; /* needed for button positioning */
}
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    font-family: var(--font-head); font-weight: 800; font-size: 1.3rem; letter-spacing: -0.03em;
    background: var(--ig-grad);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .badge {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
    font-size: 0.72rem; font-weight: 500; padding: 3px 10px; border-radius: 99px;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
.btn-primary {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--ig-grad-btn);
  color: #fff;
  border: none;
  border-radius: 9px;
  padding: 9px 18px;
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 0.88rem;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;

  position: absolute;  /* key change */
  right: 32px;         /* push to right */
}
  .btn-primary::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.12); opacity: 0; transition: opacity 0.2s; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(221,42,123,0.45); }
  .btn-primary:hover::after { opacity: 1; }

  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px 0; gap: 14px; flex-wrap: wrap; position: relative; z-index: 1;
  }
  .toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  .search-input {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 9px; padding: 8px 14px 8px 34px; font-family: var(--font-body);
    font-size: 0.88rem; width: 220px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: #dd2a7b; box-shadow: 0 0 0 3px rgba(221,42,123,0.15); }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 9px; padding: 8px 14px; font-family: var(--font-body); font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: #dd2a7b; color: #dd2a7b; }
  .filter-btn.active {
    background: linear-gradient(135deg, rgba(245,133,41,0.15), rgba(221,42,123,0.2), rgba(81,91,212,0.15));
    border-color: #dd2a7b; color: #f58529;
  }
  .stats { display: flex; gap: 18px; font-size: 0.82rem; color: var(--text-muted); }
  .stats strong { color: var(--text); font-weight: 600; }

  .grid-wrap { padding: 24px 32px 40px; position: relative; z-index: 1; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 18px; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; display: flex; flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s; animation: fadeUp 0.4s ease both; position: relative;
  }
  .card::before {
    content: ''; position: absolute; inset: 0; border-radius: var(--radius); padding: 1px;
    background: var(--ig-grad);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(221,42,123,0.2); }
  .card:hover::before { opacity: 1; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .card-img-wrap { position: relative; height: 190px; overflow: hidden; background: var(--surface2); }
  .card-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; transition: transform 0.4s ease; }
  .card:hover .card-img-wrap img { transform: scale(1.05); }
  .card-img-wrap::after {
    content: ''; position: absolute; bottom:0; left:0; right:0; height:60px;
    background: linear-gradient(to top, rgba(10,10,15,0.7), transparent); pointer-events: none;
  }

  .status-pill {
    position: absolute; top:10px; left:10px; font-family: var(--font-head);
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 99px; z-index: 1;
  }
  .status-pill.active { background: rgba(80,220,120,0.18); color:#50dc78; border:1px solid rgba(80,220,120,0.3); }
  .status-pill.draft  { background: rgba(245,133,41,0.18); color:#f58529; border:1px solid rgba(245,133,41,0.35); }
  .status-pill.paused { background: rgba(221,42,123,0.18); color:#dd2a7b; border:1px solid rgba(221,42,123,0.35); }

  .card-body { padding:14px 16px 12px; flex:1; display:flex; flex-direction:column; gap:4px; }
  .card-name { font-family:var(--font-head); font-weight:700; font-size:1rem; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-category { font-size:0.77rem; color:var(--text-muted); }
  .card-price-row { display:flex; align-items:baseline; justify-content:space-between; margin-top:6px; }
  .card-price {
    font-family:var(--font-head); font-size:1.25rem; font-weight:800;
    background: var(--ig-grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .card-views { font-size:0.75rem; color:var(--text-muted); display:flex; align-items:center; gap:4px; }

  .card-actions { display:flex; border-top:1px solid var(--border); background:rgba(28,28,38,0.6); }
  .action-btn {
    flex:1; display:flex; align-items:center; justify-content:center; gap:5px;
    background:none; border:none; color:var(--text-muted);
    font-family:var(--font-body); font-size:0.78rem; font-weight:500;
    cursor:pointer; padding:10px 4px; transition:background 0.15s, color 0.15s;
  }
  .action-btn + .action-btn { border-left:1px solid var(--border); }
  .action-btn:hover      { background:var(--surface2); color:var(--text); }
  .action-btn.edit:hover { color:#515bd4; }
  .action-btn.dupe:hover { color:#f58529; }
  .action-btn.del:hover  { color:#dd2a7b; }

  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75);
    backdrop-filter:blur(8px); z-index:200; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:18px;
    width:100%; max-width:480px; padding:28px;
    animation:popIn 0.25s cubic-bezier(.34,1.56,.64,1) both; position:relative; overflow:hidden;
  }
  .modal::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--ig-grad); }
  @keyframes popIn { from{opacity:0;transform:scale(0.9);} to{opacity:1;transform:scale(1);} }
  .modal-title {
    font-family:var(--font-head); font-size:1.25rem; font-weight:800; margin-bottom:20px;
    background:var(--ig-grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .form-group { margin-bottom:14px; }
  .form-label { display:block; font-size:0.78rem; font-weight:500; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.06em; }
  .form-input, .form-select, .form-textarea {
    width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text);
    border-radius:9px; padding:10px 13px; font-family:var(--font-body); font-size:0.9rem;
    outline:none; transition:border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:#dd2a7b; box-shadow:0 0 0 3px rgba(221,42,123,0.15); }
  .form-select option { background:var(--surface2); }
  .form-textarea { resize:vertical; min-height:70px; }
  .form-row { display:flex; gap:12px; }
  .form-row .form-group { flex:1; }
  .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
  .btn-secondary {
    background:var(--surface2); border:1px solid var(--border); color:var(--text-muted);
    border-radius:9px; padding:9px 18px; font-family:var(--font-head); font-weight:600; font-size:0.88rem;
    cursor:pointer; transition:border-color 0.2s, color 0.2s;
  }
  .btn-secondary:hover { border-color:var(--text-muted); color:var(--text); }
  .confirm-text { color:var(--text-muted); font-size:0.9rem; line-height:1.5; margin-bottom:4px; }
  .confirm-name { color:#dd2a7b; font-weight:600; }
  .btn-danger {
    background:linear-gradient(135deg,#dd2a7b,#8134af); color:#fff; border:none; border-radius:9px;
    padding:9px 18px; font-family:var(--font-head); font-weight:700; font-size:0.88rem;
    cursor:pointer; transition:opacity 0.15s, transform 0.15s;
  }
  .btn-danger:hover { opacity:0.85; transform:translateY(-1px); }

  .empty { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--text-muted); }
  .empty-icon { font-size:3rem; margin-bottom:14px; }
  .empty h3 { font-family:var(--font-head); font-size:1.1rem; color:var(--text); margin-bottom:6px; }

  .toast {
    position:fixed; bottom:28px; right:28px; background:var(--surface); border:1px solid #dd2a7b;
    color:var(--text); border-radius:10px; padding:12px 18px; font-size:0.87rem; font-family:var(--font-body);
    z-index:999; display:flex; align-items:center; gap:8px;
    animation:slideIn 0.3s ease both; box-shadow:0 8px 30px rgba(221,42,123,0.25);
  }
  @keyframes slideIn { from{opacity:0;transform:translateX(20px);} to{opacity:1;transform:translateX(0);} }
  .toast-dot { width:8px; height:8px; border-radius:50%; background:var(--ig-grad-btn); flex-shrink:0; }
  .toast-dot.warn { background:#dd2a7b; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">Seller Dashboard</div>
  </div>
  <button class="btn-primary" onclick="openAddModal()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    Add Listing
  </button>
</div>

<div class="toolbar">
  <div class="toolbar-left">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search listings…" oninput="renderGrid()">
    </div>
    <button class="filter-btn active" id="filterAll"    onclick="setFilter('all')">All</button>
    <button class="filter-btn"        id="filterActive" onclick="setFilter('active')">Active</button>
    <button class="filter-btn"        id="filterDraft"  onclick="setFilter('draft')">Draft</button>
    <button class="filter-btn"        id="filterPaused" onclick="setFilter('paused')">Paused</button>
  </div>
  <div class="stats" id="statsBar"></div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Listing</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input class="form-input" id="fName" type="text" placeholder="Product name">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <input class="form-input" id="fCategory" type="text" placeholder="e.g. Electronics">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Price ($)</label>
        <input class="form-input" id="fPrice" type="number" min="0" step="0.01" placeholder="0.00">
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="fStatus">
          <option value="active">Active</option>
          <option value="draft">Draft</option>
          <option value="paused">Paused</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Image URL</label>
      <input class="form-input" id="fImage" type="text" placeholder="https://…">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="fDesc" placeholder="Short description…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModals()">Cancel</button>
      <button class="btn-primary" onclick="saveListing()">Save Listing</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-title">Remove Listing?</div>
    <p class="confirm-text">You're about to permanently remove <span class="confirm-name" id="confirmName"></span>. This cannot be undone.</p>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModals()">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">Remove</button>
    </div>
  </div>
</div>

<script>
const PLACEHOLDER_IMGS = [
  'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&q=80',
  'https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=600&q=80',
  'https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=600&q=80',
  'https://images.unsplash.com/photo-1612817288484-6f916006741a?w=600&q=80',
  'https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=600&q=80',
  'https://images.unsplash.com/photo-1585771724684-38269d6639fd?w=600&q=80',
];
let listings = [
  { id:1, name:'Minimalist Watch',  category:'Accessories', price:149.00, status:'active', views:842,  image:PLACEHOLDER_IMGS[0], desc:'Clean-dial timepiece for everyday wear.' },
  { id:2, name:'Glow Face Serum',   category:'Beauty',      price:54.99,  status:'active', views:613,  image:PLACEHOLDER_IMGS[1], desc:'Brightening vitamin C serum.' },
  { id:3, name:'Trail Runner X9',   category:'Footwear',    price:119.00, status:'active', views:1290, image:PLACEHOLDER_IMGS[2], desc:'Lightweight all-terrain shoe.' },
  { id:4, name:'Orbit Headphones',  category:'Electronics', price:229.00, status:'draft',  views:0,    image:PLACEHOLDER_IMGS[3], desc:'Over-ear wireless headphones.' },
  { id:5, name:'Retro Cam',         category:'Electronics', price:310.00, status:'paused', views:407,  image:PLACEHOLDER_IMGS[4], desc:'Vintage-style instant camera.' },
  { id:6, name:'Craft Coffee Kit',  category:'Kitchen',     price:79.00,  status:'active', views:228,  image:PLACEHOLDER_IMGS[5], desc:'Complete pour-over setup.' },
];
let nextId=7, activeFilter='all', editingId=null, deletingId=null;

function setFilter(f) {
  activeFilter=f;
  ['All','Active','Draft','Paused'].forEach(x=>document.getElementById('filter'+x).classList.remove('active'));
  document.getElementById('filter'+f.charAt(0).toUpperCase()+f.slice(1)).classList.add('active');
  renderGrid();
}
function renderGrid() {
  const q=document.getElementById('searchInput').value.toLowerCase();
  let items=listings.filter(l=>(activeFilter==='all'||l.status===activeFilter)&&(!q||l.name.toLowerCase().includes(q)||l.category.toLowerCase().includes(q)));
  document.getElementById('statsBar').innerHTML=`<span><strong>${listings.length}</strong> total</span><span><strong>${listings.filter(l=>l.status==='active').length}</strong> active</span><span><strong>${listings.filter(l=>l.status==='draft').length}</strong> draft</span>`;
  const grid=document.getElementById('grid');
  if(!items.length){grid.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><h3>No listings found</h3><p>Try a different filter or add a new listing.</p></div>`;return;}
  grid.innerHTML=items.map((l,i)=>`
    <div class="card" style="animation-delay:${i*0.05}s">
      <div class="card-img-wrap">
        <img src="${l.image}" alt="${l.name}" onerror="this.src='https://placehold.co/600x400/1c1c26/555?text=No+Image'">
        <span class="status-pill ${l.status}">${l.status}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${l.name}</div>
        <div class="card-category">${l.category}</div>
        <div class="card-price-row">
          <div class="card-price">$${Number(l.price).toFixed(2)}</div>
          <div class="card-views"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${l.views.toLocaleString()}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="action-btn edit" onclick="openEditModal(${l.id})"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit</button>
        <button class="action-btn dupe" onclick="duplicateListing(${l.id})"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Duplicate</button>
        <button class="action-btn del" onclick="openDeleteModal(${l.id})"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>Remove</button>
      </div>
    </div>`).join('');
}
function openAddModal(){editingId=null;document.getElementById('modalTitle').textContent='New Listing';['fName','fCategory','fImage','fDesc'].forEach(id=>document.getElementById(id).value='');document.getElementById('fPrice').value='';document.getElementById('fStatus').value='active';document.getElementById('editModal').classList.add('open');}
function openEditModal(id){const l=listings.find(x=>x.id===id);if(!l)return;editingId=id;document.getElementById('modalTitle').textContent='Edit Listing';document.getElementById('fName').value=l.name;document.getElementById('fCategory').value=l.category;document.getElementById('fPrice').value=l.price;document.getElementById('fStatus').value=l.status;document.getElementById('fImage').value=l.image;document.getElementById('fDesc').value=l.desc;document.getElementById('editModal').classList.add('open');}
function openDeleteModal(id){deletingId=id;const l=listings.find(x=>x.id===id);document.getElementById('confirmName').textContent=`"${l.name}"`;document.getElementById('confirmModal').classList.add('open');}
function closeModals(){document.getElementById('editModal').classList.remove('open');document.getElementById('confirmModal').classList.remove('open');}
['editModal','confirmModal'].forEach(id=>document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModals();}));
function saveListing(){const name=document.getElementById('fName').value.trim();const price=parseFloat(document.getElementById('fPrice').value);if(!name||isNaN(price)){showToast('Please fill in name and price.',true);return;}const data={name,price,category:document.getElementById('fCategory').value.trim()||'Uncategorized',status:document.getElementById('fStatus').value,image:document.getElementById('fImage').value.trim()||PLACEHOLDER_IMGS[Math.floor(Math.random()*PLACEHOLDER_IMGS.length)],desc:document.getElementById('fDesc').value.trim()};if(editingId){const idx=listings.findIndex(x=>x.id===editingId);listings[idx]={...listings[idx],...data};showToast('Listing updated!');}else{listings.unshift({id:nextId++,views:0,...data});showToast('New listing added!');}closeModals();renderGrid();}
function confirmDelete(){listings=listings.filter(x=>x.id!==deletingId);closeModals();renderGrid();showToast('Listing removed.',true);}
function duplicateListing(id){const l=listings.find(x=>x.id===id);const copy={...l,id:nextId++,name:l.name+' (Copy)',status:'draft',views:0};listings.splice(listings.findIndex(x=>x.id===id)+1,0,copy);renderGrid();showToast(`"${l.name}" duplicated as draft.`);}
let toastTimer;
function showToast(msg,warn=false){clearTimeout(toastTimer);const ex=document.querySelector('.toast');if(ex)ex.remove();const t=document.createElement('div');t.className='toast';t.innerHTML=`<span class="toast-dot${warn?' warn':''}"></span>${msg}`;document.body.appendChild(t);toastTimer=setTimeout(()=>t.remove(),3200);}
renderGrid();
</script>
</body>
